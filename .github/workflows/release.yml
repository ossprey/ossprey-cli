name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Force release version (e.g. v0.2.0). Empty = auto-bump from conventional commits."
        required: false

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag:
    name: Bump tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.out.outputs.new_tag }}
      new_version: ${{ steps.out.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: bump
        if: github.event_name != 'workflow_dispatch' || inputs.version == ''
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: false
          tag_prefix: v

      - id: manual
        if: github.event_name == 'workflow_dispatch' && inputs.version != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          tag="${VERSION#v}"
          tag="v${tag}"
          if git rev-parse "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "tag ${tag} already exists" >&2
            exit 1
          fi
          git tag "${tag}" "${GITHUB_SHA}"
          git push origin "${tag}"
          echo "new_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "new_version=${tag#v}" >> "$GITHUB_OUTPUT"

      - id: out
        run: |
          tag="${{ steps.manual.outputs.new_tag || steps.bump.outputs.new_tag }}"
          ver="${{ steps.manual.outputs.new_version || steps.bump.outputs.new_version }}"
          echo "new_tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "new_version=${ver}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: tag
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ needs.tag.outputs.new_version }}
        run: |
          mkdir -p dist
          ext=""
          [ "$GOOS" = "windows" ] && ext=".exe"
          out="dist/ossprey-${GOOS}-${GOARCH}${ext}"
          go build -trimpath \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o "$out" ./cmd/ossprey
          (cd dist && sha256sum "$(basename "$out")" > "$(basename "$out").sha256")

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          retention-days: 1

  release:
    name: Publish release
    needs: [tag, build]
    if: needs.tag.outputs.new_tag != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.new_tag }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true

      - name: Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.tag.outputs.new_tag }}" \
            --title "${{ needs.tag.outputs.new_tag }}" \
            --generate-notes \
            dist/* install.sh
